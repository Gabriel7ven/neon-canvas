<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Neon Canvas</title>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        
        <div class="button-container">
            <button onclick="toggleShape('rect')">RECT</button>
            <button onclick="toggleShape('circle')">CIRCLE</button>
            <button onclick="toggleShape('triangle')">TRIANGLE</button>
            <button id="play-pause" onclick="togglePlayPause()">PAUSE</button>
        </div>
        <script type="module" src="main.js"></script>
    </body>
</html>
